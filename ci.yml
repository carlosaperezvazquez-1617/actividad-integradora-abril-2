name: Continuous Integration Pipeline

# Define los disparadores (triggers) del workflow
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Job 1: Verificación de integridad de archivos
  validate-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Validar existencia de archivos críticos
        run: |
          echo "Iniciando validación de estructura de archivos..."
          test -f README.md && echo "README.md: OK" || (echo "Falta README.md" && exit 1)
          test -f setup_project.sh && echo "setup_project.sh: OK" || (echo "Falta setup_project.sh" && exit 1)
          test -f project_report.py && echo "project_report.py: OK" || (echo "Falta project_report.py" && exit 1)
          test -f docker-compose.yml && echo "docker-compose.yml: OK" || (echo "Falta docker-compose.yml" && exit 1)
          test -f infraestructura-base.yaml && echo "infraestructura-base.yaml: OK" || (echo "Falta infraestructura-base.yaml" && exit 1)
          test -f app/Dockerfile && echo "app/Dockerfile: OK" || (echo "Falta app/Dockerfile" && exit 1)
          test -f helper/Dockerfile && echo "helper/Dockerfile: OK" || (echo "Falta helper/Dockerfile" && exit 1)
          echo "Estructura de archivos validada correctamente."

  # Job 2: Simulación del ciclo de vida del despliegue
  simulate-pipeline:
    runs-on: ubuntu-latest
    needs: validate-files # Este job solo corre si el primero termina con éxito
    steps:
      - name: Stage 1: Source
        run: echo "Etapa SOURCE - Código descargado y verificado."

      - name: Stage 2: Build
        run: echo "Etapa BUILD - Simulando construcción de imágenes Docker..."

      - name: Stage 3: Validate
        run: echo "Etapa VALIDATE - Ejecutando pruebas unitarias y de integración..."

      - name: Stage 4: Ready for Deploy
        run: echo "Etapa READY FOR DEPLOY - Artefactos listos para el despliegue en AWS."